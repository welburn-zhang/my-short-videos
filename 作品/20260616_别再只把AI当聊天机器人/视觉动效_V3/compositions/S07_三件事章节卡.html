<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="../assets/gsap.min.js"></script>
    <style>
      @font-face { font-family: "ZBD Heiti"; src: url("../assets/ZBD-Heiti-Light.ttc"); font-weight: 300 600; }
      @font-face { font-family: "ZBD Heiti"; src: url("../assets/ZBD-Heiti-Medium.ttc"); font-weight: 700 900; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; background: #112a4d; }
      body { font-family: "ZBD Heiti", sans-serif; }
      #root { position: relative; width: 1080px; height: 1920px; overflow: hidden; background: #112a4d; color: #f8fbff; }
      .orb { position: absolute; width: 760px; height: 760px; right: -330px; top: -190px; border-radius: 50%; background: radial-gradient(circle, rgba(52,120,246,.5), rgba(52,120,246,0) 68%); }
      .ghost { position: absolute; right: -50px; bottom: 160px; color: rgba(238,245,255,.055); font-family: "JetBrains Mono", monospace; font-size: 570px; line-height: .8; font-weight: 800; }
      .rule { position: absolute; left: 0; top: 154px; width: 100%; height: 3px; background: rgba(238,245,255,.2); }
      .content { position: relative; width: 100%; height: 100%; padding: 150px 96px 130px; display: flex; flex-direction: column; justify-content: center; gap: 48px; }
      .meta { color: #8bb6ff; font-family: "JetBrains Mono", monospace; font-size: 30px; font-weight: 700; letter-spacing: .11em; }
      .kicker { display: flex; align-items: center; gap: 22px; color: #eef5ff; font-size: 42px; font-weight: 600; }
      .dot { width: 18px; height: 18px; border-radius: 50%; background: #ff9d42; }
      h1 { max-width: 880px; font-size: 128px; line-height: 1.08; letter-spacing: -.055em; font-weight: 900; }
      h1 span { color: #75a8ff; }
      .steps { display: flex; gap: 20px; margin-top: 16px; }
      .step { width: 112px; height: 14px; border-radius: 99px; background: rgba(238,245,255,.18); overflow: hidden; }
      .step i { display: block; width: 100%; height: 100%; background: #3478f6; transform-origin: left; }
      .name { position: absolute; left: 96px; bottom: 126px; font-size: 30px; color: #a9c8ff; font-weight: 600; }
      .corner { position: absolute; right: 74px; bottom: 76px; width: 100px; height: 100px; border-right: 3px solid rgba(117,168,255,.55); border-bottom: 3px solid rgba(117,168,255,.55); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="s07-title" data-start="0" data-duration="4" data-width="1080" data-height="1920">
      <div class="orb"></div><div class="ghost">03</div><div class="rule"></div>
      <div class="content">
        <div class="meta">AI TASK · CHAPTER 01</div>
        <div class="kicker"><span class="dot"></span><span>别只让 AI 回答</span></div>
        <h1>让 AI 干活<br />说清 <span>3 件事</span></h1>
        <div class="steps"><span class="step"><i></i></span><span class="step"><i></i></span><span class="step"><i></i></span></div>
      </div>
      <div class="name">张半蛋 · AI 帮你做完</div><div class="corner"></div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from(".rule", { scaleX: 0, transformOrigin: "left", duration: .5, ease: "power3.out" }, .15);
      tl.from(".meta", { opacity: 0, x: -60, duration: .4, ease: "expo.out" }, .25);
      tl.from(".kicker", { opacity: 0, y: 36, duration: .42, ease: "back.out(1.2)" }, .43);
      tl.from("h1", { opacity: 0, x: 80, scale: .96, duration: .62, ease: "power4.out" }, .58);
      tl.from(".step i", { scaleX: 0, duration: .34, stagger: .12, ease: "power2.out" }, 1.05);
      tl.from(".name", { opacity: 0, x: -35, duration: .35, ease: "sine.out" }, 1.14);
      tl.from(".corner", { opacity: 0, scale: .7, transformOrigin: "right bottom", duration: .5, ease: "power1.out" }, .65);
      tl.to(".orb", { scale: 1.08, x: -20, duration: 3.3, ease: "sine.inOut" }, .3);
      window.__timelines["s07-title"] = tl;
    </script>
  </body>
</html>
